server {
  listen 80;
  server_name localhost;

  # ── index.html：永遠不快取 ────────────────────────────────────────────────
  # Angular 每次 build 會更新 index.html 的 script/link src（含 hash），
  # 若瀏覽器快取舊版 index.html 就會載到不存在的 JS/CSS，造成白畫面。
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ── 有 hash 的靜態資源：永久快取 ─────────────────────────────────────────
  # Angular build 對 JS、CSS 檔名加入 content hash（如 main.efd7c162.js），
  # 檔案內容不變則 URL 不變，可安全設定 1 年不過期（immutable = 不需重新驗證）。
  location ~* \.(js|css)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── 圖片與字型：30 天快取 ─────────────────────────────────────────────────
  # 圖片沒有 hash，用 30 天快取即可；字型極少更換，也適用同策略。
  location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  # ── 其他請求：SPA fallback ────────────────────────────────────────────────
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    index index.html index.htm;
  }
}
