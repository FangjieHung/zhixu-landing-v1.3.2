name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (SSR prerender)
        run: npm run prerender:web

      - name: Deploy to public repo
        run: |
          cd dist/apps/web/browser
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S') from ${{ github.sha }}"
          git push --force \
            https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/FangjieHung/zhixu-web.git \
            HEAD:main
