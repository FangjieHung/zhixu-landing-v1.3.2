<div class="h-screen w-screen ">
  <!-- day 5:00~18:00 -->
  <section class="relative bg-gradient-to-t from-sky-200 to-sky-500 h-full w-full overflow-hidden"
    *ngIf="timeSlot === 'day'">
    <img alt="background" src="assets/img/illustration/cloud.svg"
      class="absolute inset-x-0 w-full h-auto mx-auto opacity-60 top-0 lg:top-1/2">
    <img alt="background" src="assets/img/illustration/morning-sun.svg" class="absolute left-12 top-12 w-1/6 h-auto">
  </section>

  <!-- night 18:00~5:00 -->
  <section class="relative bg-gradient-to-t from-blue-600 to-black h-full w-full overflow-hidden"
    *ngIf="timeSlot === 'night'">
    <img alt="background" src="assets/img/illustration/cloud.svg"
      class="absolute inset-x-0 w-full h-auto -bottom-10 mx-auto opacity-50 lg:-bottom-1/4">
    <div class="absolute left-12 top-12 w-1/6 h-auto">
      <img alt="background" src="assets/img/illustration/glory.svg" class="w-full h-auto blur-md">
      <img alt="background" src="assets/img/illustration/moon.svg" class="w-full h-auto absolute inset-0">
    </div>
  </section>

  <div class="absolute inset-0 m-auto w-5/6 max-h-max max-w-96">

    <div class="bg-white rounded-lg shadow-md px-6 py-8">
      <img src="assets/shared/img/logo/mark.png" alt="logo" class="mx-auto w-1/3 mb-3"/>
      <p class="text-center mb-8">您好! 歡迎來到{{ appEnv.siteName }}</p>
      <form nz-form [formGroup]="validateForm" (ngSubmit)="onSubmit()" class="space-y-3">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>帳號</mat-label>
          <input matInput type="text" formControlName="account" [required]="f['account'] | ctrlHasRequired">
          <mat-error class="text-xs" *ngIf="f['account'].errors">
            <div *ngFor="let msg of formHelper.errorMsgs(f['account'].errors, '帳號')">{{ msg }}</div>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>密碼</mat-label>
          <input matInput [type]="passwordHide ? 'password' : 'text'"  formControlName="password" [required]="f['password'] | ctrlHasRequired">
          <button mat-icon-button matSuffix (click)="passwordHide = !passwordHide" [attr.aria-label]="'不顯示密碼'"
            [attr.aria-pressed]="passwordHide">
            <mat-icon>{{passwordHide ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error class="text-xs" *ngIf="f['password'].errors">
            <div *ngFor="let msg of formHelper.errorMsgs(f['password'].errors, '密碼')">{{ msg }}</div>
          </mat-error>
        </mat-form-field>

        <button class="btn-primary btn-lg  w-full">登入</button>
      </form>
    </div>
  </div>
</div>
