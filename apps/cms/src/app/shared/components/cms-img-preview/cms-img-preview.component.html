<article
  class="group w-full h-full rounded-md focus:outline-none focus:shadow-outline elative bg-stone-100 relative shadow-sm">
  <img alt="upload preview" class="img-preview w-full h-full sticky object-cover rounded-md bg-fixed"
    [src]="combineDownloadAttUrl(_attId)" />
  <section class="flex flex-col rounded-md text-xs break-words w-full h-full z-20 absolute top-0 py-2 px-3" *ngIf="isShowDelAtt">
    <h1 class="flex-1 group-hover:text-blue-800"></h1>
    <div class="flex">
      <p class="p-1 size text-xs text-stone-700"></p>
      <div class="delete ml-auto focus:outline-none hover:bg-stone-300 p-1 rounded-md text-stone-800">
        <button (click)="onDelAppFileAtt()" class="rounded-lg">
          <svg class="pointer-events-none fill-current w-5 h-5 ml-auto text-stone-200" xmlns="http://www.w3.org/2000/svg" width="24"
            height="24" viewBox="0 0 24 24">
            <path class="pointer-events-none"
              d="M3 6l3 18h12l3-18h-18zm19-4v2h-20v-2h5.711c.9 0 1.631-1.099 1.631-2h5.316c0 .901.73 2 1.631 2h5.711z" />
          </svg>
        </button>
      </div>
    </div>
  </section>
</article>
