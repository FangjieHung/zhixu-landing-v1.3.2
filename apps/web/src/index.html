<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="utf-8" />
  <title>蘊和堂</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <!--
    rel="preload" 讓瀏覽器在解析 HTML 時就立刻排入 LCP 圖片下載，
    不用等到 CSS/JS 執行後才發現這張圖的存在，可顯著縮短 LCP 時間。
    as="image" + type="image/webp" → 告知瀏覽器資源類型，只有支援 WebP 的瀏覽器才下載。
  -->
  <link rel="preload"
        href="assets/image/photo/product-chicken-essence.webp"
        as="image"
        type="image/webp" />
  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Dancing Script 已確認未使用，移除可省 48 KiB 未使用 CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <!-- SEO -->
  <meta name="keywords" content="蘊和堂">
  <meta name="description" content="蘊和堂">
  <!-- facebook -->
  <meta property="og:type" content="company">
  <meta property="og:site_name" content="蘊和堂">
  <meta property="og:title" content="蘊和堂">
  <meta property="og:description" content="蘊和堂">
  <meta property="og:url" content="https://www.zhuhong.com.tw">
  <meta property="og:image" content="https://zhuhong.com.tw/assets/image/og/chuhung-og.png">
</head>

<body>
  <script src="https://www.youtube.com/iframe_api"></script>
  <app-root></app-root>
</body>

</html>
