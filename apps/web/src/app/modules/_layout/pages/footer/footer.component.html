<footer class="footer-root">

  <!-- ── 主體三欄 ──────────────────────────────────────────────────────── -->
  <ol class="footer-body">

    <!-- 品牌欄 -->
    <li class="footer-brand">
      <img src="assets/image/logo/landscape.svg" alt="蘊和堂"
           class="h-10 w-auto object-contain object-left brightness-0 invert mb-5" />
      <p class="footer-brand-desc">
        蘊天地之和，藏歲月之美。我們致力於將傳統養生智慧，融入現代精緻生活。
      </p>
    </li>

    <!-- 聯絡資訊 -->
    <li>
      <h5 class="footer-heading">Contact</h5>
      <address class="footer-links">
        <ng-container *ngIf="('LOCATION(中文地址)' | aryFindValue: (response?.contactDetails || []): 'name': 'value') as addr; else defaultAddr">
          {{ addr }}
        </ng-container>
        <ng-template #defaultAddr>
          臺中市太平區永平路三段 168 巷 3 號
        </ng-template>
        <br/>
        <ng-container *ngIf="('PHONE' | aryFindValue: (response?.contactDetails || []): 'name': 'value') as phone; else defaultPhone">
          {{ phone }}
        </ng-container>
        <ng-template #defaultPhone>
          +886 (04) 2275 6696
        </ng-template>
      </address>
    </li>

    <li>
      <!-- 社群 -->
      <h5 class="footer-heading">Social Media</h5>
      <div class="footer-links">
        <a
           [attr.href]="('Facebook' | aryFindValue: (response?.socialMedia || []): 'name': 'url') || '#'"
           target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          Facebook
        </a>
        <a
           [attr.href]="('Instagram' | aryFindValue: (response?.socialMedia || []): 'name': 'url') || '#'"
           target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          Instagram
        </a>
      </div>
      </li>
  </ol>

  <!-- ── Copyright ──────────────────────────────────────────────────────── -->
  <div class="footer-copyright">
    <span>© {{ currYear }} Yun Ho Tang. Wisdom of the Sages, Care of the Mother.</span>
    <div class="flex gap-6 mt-2 md:mt-0">
      <span>All rights reserved.</span>
      <span>Designed with BonBonDi.</span>
    </div>
  </div>

</footer>
